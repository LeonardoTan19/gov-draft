name: GB/T 9704-2012 党政机关公文格式
version: 1.0.0
description: 符合 GB/T 9704-2012《党政机关公文格式》国家标准的公文标准。
content:
  body:
    fonts:
      family: Times New Roman, 仿宋_GB2312, FangSong, STFangsong, serif
    style:
      size: 16pt
      weight: 400
      color: '#000000'
    paragraph:
      align: justify
      indent: 2em
      spacing:
        lineHeight: 28.95pt
        before: '0'
        after: '0'
  h1:
    fonts:
      family: Times New Roman, 方正小标宋_GBK, 方正小标宋简体, FZXiaoBiaoSong-B05, 黑体, SimHei, STHeiti, sans-serif
    style:
      size: 22pt
      weight: 400
      color: '#000000'
    paragraph:
      align: center
      indent: 0em
      spacing:
        lineHeight: 28.95pt
        before: 2lines
        after: '1lines'
    numberingStyle: ''
  h2:
    fonts:
      family: Times New Roman, 黑体, SimHei, STHeiti, Microsoft YaHei, sans-serif
    style:
      size: 16pt
      weight: 400
      color: '#000000'
    paragraph:
      align: left
      indent: 2em
      spacing:
        lineHeight: 28.95pt
        before: '0'
        after: '0'
    numberingStyle: '{zhHansIndex}、'
  h3:
    fonts:
      family: Times New Roman, 楷体_GB2312, 楷体, KaiTi, KaiTi_GB2312, STKaiti, serif
    style:
      size: 16pt
      weight: 400
      color: '#000000'
    paragraph:
      align: left
      indent: 2em
      spacing:
        lineHeight: 28.95pt
        before: '0'
        after: '0'
    numberingStyle: '（{zhHansIndex}）'
  h4:
    fonts:
      family: Times New Roman, 仿宋_GB2312, 仿宋, FangSong, FangSong_GB2312, STFangsong, serif
    style:
      size: 16pt
      weight: 400
      color: '#000000'
    paragraph:
      align: left
      indent: 2em
      spacing:
        lineHeight: 28.95pt
        before: '0'
        after: '0'
    numberingStyle: '{romanIndex}．'
colors:
  text: '#000000'
  background: '#ffffff'
  accent: '#FF0000'
page:
  size: A4
  orientation: portrait
  margins:
    top: 37mm
    right: 26mm
    bottom: 35mm
    left: 28mm
parser:
  html: false
  breaks: true
  linkify: true
  typographer: true
  headingNumbering: true
  localStyleAliases:
    bodyIndent: content.body.paragraph.indent
    h1Indent: content.h1.paragraph.indent
    h2Indent: content.h2.paragraph.indent
    h3Indent: content.h3.paragraph.indent
    h4Indent: content.h4.paragraph.indent
    indent: content.body.paragraph.indent
    # align: content.body.paragraph.align
  disabledSyntax:
    - codeBlock
    - blockquote
    - unorderedList
    - horizontalRule
