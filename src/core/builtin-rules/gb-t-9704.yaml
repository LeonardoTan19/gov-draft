name: GB/T 9704-2012 党政机关公文格式
version: 1.0.0
description: 符合 GB/T 9704-2012《党政机关公文格式》国家标准的公文标准。
fonts:
  body:
    family: 仿宋_GB2312, FangSong, STFangsong, serif
    size: 16pt
    weight: 400
    bold: false
    align: justify
  heading:
    h1:
      family: 方正小标宋_GBK, 方正小标宋简体, FZXiaoBiaoSong-B05, 黑体, SimHei, STHeiti, sans-serif
      size: 22pt
      weight: 700
      bold: true
      align: center
      numberingStyle: ''
    h2:
      family: 黑体, SimHei, STHeiti, Microsoft YaHei, sans-serif
      size: 16pt
      weight: 700
      bold: true
      align: left
      numberingStyle: '{number}、'
    h3:
      family: 楷体_GB2312, 楷体, KaiTi, KaiTi_GB2312, STKaiti, serif
      size: 16pt
      weight: 700
      bold: true
      align: left
      numberingStyle: '（{number}）'
    h4:
      family: 仿宋_GB2312, 仿宋, FangSong, FangSong_GB2312, STFangsong, serif
      size: 16pt
      weight: 400
      bold: false
      align: left
      numberingStyle: '{number}．'
spacing:
  lineHeight: 28.95pt
  paragraphSpacing: '0'
  indent: 2em
  headingParagraphBreak: false
colors:
  text: '#000000'
  background: '#ffffff'
  accent: '#FF0000'
page:
  size: A4
  orientation: portrait
  margins:
    top: 37mm
    right: 26mm
    bottom: 35mm
    left: 28mm
parser:
  html: false
  breaks: true
  linkify: true
  typographer: true
  headingNumbering: true
  disabledSyntax:
    - codeBlock
    - blockquote
    - unorderedList
    - horizontalRule
